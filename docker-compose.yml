version: '3.9'

services:
  backend:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    volumes:
      # Volumen nombrado → el .db sobrevive reinicios y rebuilds
      - calidocs_data:/app/data
    expose:
      - "3000"
    depends_on: []
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', r => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: .          # raíz del repo → permite COPY frontend/ y nginx/
      dockerfile: nginx/Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  calidocs_data:
    driver: local
