version: '3.9'

services:
  backend:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    volumes:
      # Si HOST_DOCS_PATH está definido en .env se usa como bind mount (carpeta del PC anfitrión).
      # Si no, se usa el volumen Docker interno 'calidocs_data'.
      - ${HOST_DOCS_PATH:-calidocs_data}:/app/data
    expose:
      - "3000"
    depends_on: []
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', r => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: .          # raíz del repo → permite COPY frontend/ y nginx/
      dockerfile: nginx/Dockerfile
    restart: unless-stopped
    ports:
      - "7500:80"
    depends_on:
      - backend

volumes:
  calidocs_data:
    driver: local
