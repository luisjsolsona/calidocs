version: '3.9'

# Uso: docker-compose -f docker-compose.yml -f docker-compose.dev.yml up --build
#
# Diferencias respecto a prod:
#   - backend: nodemon + código montado como volumen (hot-reload)
#   - nginx sirve el frontend directamente desde ./frontend/
#   - puerto 3000 expuesto al host para depurar la API directamente

services:
  backend:
    build:
      context: ./backend
      target: dev
    command: npx nodemon src/server.js
    volumes:
      - ./backend:/app
      - /app/node_modules          # evita que el host sobreescriba node_modules
      - calidocs_data:/app/data
    ports:
      - "3000:3000"                # acceso directo a la API desde el host
    environment:
      NODE_ENV: development

  frontend:
    build:
      context: ./nginx
    volumes:
      - ./frontend:/usr/share/nginx/html:ro   # hot-reload de HTML/JS al guardar
    ports:
      - "7500:80"

volumes:
  calidocs_data:
    driver: local
